name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  APP_NAME: 'FluentFold'
  PLATFORM: 'x64'

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Create self-signed cert for MSIX
        run: |
          New-SelfSignedCertificate -Type Custom `
            -Subject "CN=FluentFold" `
            -KeyUsage DigitalSignature `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -CertStoreLocation "Cert:\CurrentUser\My" | `
            Select-Object -ExpandProperty Thumbprint | `
            Set-Content cert-thumbprint.txt
          $thumbprint = Get-Content cert-thumbprint.txt
          Get-ChildItem "Cert:\CurrentUser\My\$thumbprint" | `
            Export-PfxCertificate -FilePath "$env:USERPROFILE\FluentFold_TemporaryKey.pfx" `
            -Password (ConvertTo-SecureString -String "" -Force -AsPlainText)
          Copy-Item "$env:USERPROFILE\FluentFold_TemporaryKey.pfx" `
            "FluentFoldPackage\FluentFoldPackage_TemporaryKey.pfx"

      - name: Restore NuGet
        run: nuget restore ${{ env.APP_NAME }}.sln

      - name: Build MSIX package
        run: |
          msbuild ${{ env.APP_NAME }}.sln `
            /p:Configuration=${{ env.CONFIGURATION }} `
            /p:Platform=${{ env.PLATFORM }} `
            /p:AppxPackage=true `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=StoreUpload `
            /p:PackageCertificateKeyFile=FluentFoldPackage_TemporaryKey.pfx

      - name: Locate MSIX
        run: |
          $msix = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1
          if ($msix) {
            Copy-Item $msix.FullName "publish/${{ env.APP_NAME }}-${{ env.PLATFORM }}.msix"
            Write-Host "MSIX: $($msix.FullName)"
          } else {
            Write-Host "No MSIX found"
          }

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.PLATFORM }}-msix
          path: publish/${{ env.APP_NAME }}-${{ env.PLATFORM }}.msix
          if-no-files-found: warn