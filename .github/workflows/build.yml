name: Build MSIX Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      matrix:
        platform: [x64, x86, arm64]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build MSIX for ${{ matrix.platform }}
        run: |
          dotnet build -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifierOverride=win-${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackage=true `
            --no-restore

      - name: Sign MSIX (if certificate secrets configured)
        if: env.CERT_BASE64 != '' && env.CERT_PASSWORD != ''
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          $msix = Get-ChildItem -Recurse -Filter "*.msix" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $msix) { throw "No MSIX found to sign" }
          $pfxPath = "$env:RUNNER_TEMP\signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_BASE64))
          $signtool = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe"
          & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:CERT_PASSWORD $msix
          Write-Host "Signed: $msix"

      - name: Upload MSIX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}
          path: |
            bin/${{ matrix.platform }}/Release/**/*.msix
            bin/${{ matrix.platform }}/Release/**/*.msixupload
            **/AppPackages/**/*.msix
            **/AppPackages/**/*.msixupload
          if-no-files-found: warn
