name: Build MSIX + Portable Packages

# Triggered on push/PR to main; signs with CERT_BASE64/CERT_PASSWORD secrets if configured

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      matrix:
        platform: [x64, x86, arm64]
    runs-on: windows-latest
    env:
      CERT_BASE64: ${{ secrets.CERT_BASE64 }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build MSIX for ${{ matrix.platform }}
        run: |
          dotnet build -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifierOverride=win-${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackage=true `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            --no-restore

      - name: Sign MSIX (if certificate secrets configured)
        if: env.CERT_BASE64 != '' && env.CERT_PASSWORD != ''
        shell: pwsh
        run: |
          $signtool = "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe"
          $pfxPath = "$env:RUNNER_TEMP\signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_BASE64))
          Get-ChildItem -Recurse -Filter "*.msix" | ForEach-Object {
            & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:CERT_PASSWORD $_.FullName
            Write-Host "Signed: $($_.Name)"
          }

      - name: Upload MSIX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}
          path: |
            bin/${{ matrix.platform }}/Release/**/*.msix
            bin/${{ matrix.platform }}/Release/**/*.msixupload
            **/AppPackages/**/*.msix
            **/AppPackages/**/*.msixupload
          if-no-files-found: warn

  portable:
    strategy:
      matrix:
        platform: [x64]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=win-${{ matrix.platform }}

      - name: Publish portable for ${{ matrix.platform }}
        shell: pwsh
        run: |
          dotnet publish -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=win-${{ matrix.platform }} `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:PublishReadyToRun=false `
            --no-restore
          Write-Host "=== Publish output locations ==="
          Get-ChildItem -Recurse -Filter "FluentFold.exe" -Path "bin" | Select-Object FullName

      - name: Zip publish output
        shell: pwsh
        run: |
          $publishDir = Get-ChildItem -Path "bin\${{ matrix.platform }}\Release\net10.0-windows10.0.26100.0\win-${{ matrix.platform }}\publish" -ErrorAction SilentlyContinue
          if (-not $publishDir) {
            $publishDir = Get-ChildItem -Recurse -Filter "FluentFold.exe" -Path "bin" | Select-Object -First 1 -ExpandProperty Directory
          }
          if (-not $publishDir) {
            Write-Warning "Publish output not found"
            Get-ChildItem -Path "bin" -Depth 3 -Directory | Select-Object FullName
            exit 1
          }
          Write-Host "Zipping: $publishDir"
          Compress-Archive -Path "$publishDir\*" -DestinationPath "FluentFold-${{ matrix.platform }}-portable.zip" -Force

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}-portable
          path: FluentFold-${{ matrix.platform }}-portable.zip
          if-no-files-found: warn
