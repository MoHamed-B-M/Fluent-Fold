name: Build MSIX + Portable Packages

# Triggered on push/PR to main; signs with CERT_BASE64/CERT_PASSWORD secrets if configured

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, x86, arm64]
    runs-on: windows-latest
    env:
      CERT_BASE64: ${{ secrets.CERT_BASE64 }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build MSIX for ${{ matrix.platform }}
        run: |
          dotnet build -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifierOverride=win-${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackage=true `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            --no-restore

      - name: Patch manifest for Store (replace GUID Name with Hamma.FluentFold)
        shell: pwsh
        run: |
          $makeappx = Resolve-Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\makeappx.exe" | Select-Object -First 1 -ExpandProperty Path
          if (-not $makeappx) { Write-Host "makeappx not found"; exit 1 }
          Get-ChildItem -Recurse -Filter "FluentFold_*.msix" | ForEach-Object {
            $msix = $_.FullName
            $name = $_.BaseName
            Write-Host "Patching: $($_.Name)"
            $dir = "$env:RUNNER_TEMP\msix_$name"
            $newMsix = "$env:RUNNER_TEMP\$($_.Name)"
            New-Item -ItemType Directory -Force -Path $dir | Out-Null
            & $makeappx unpack /p $msix /d $dir /o 2>&1
            $manifest = "$dir\AppxManifest.xml"
            if (-not (Test-Path $manifest)) { Write-Host "  AppxManifest.xml not found"; return }
            $xml = [System.IO.File]::ReadAllText($manifest)
            $xml = $xml -replace 'Name="C5A1E627-2AFB-440C-A06A-231E03AB2ED4"', 'Name="Hamma.FluentFold"'
            $xml = $xml -replace 'Publisher="CN=AppPublisher"', 'Publisher="CN=3232318E-230A-4E9E-BFFD-E1BEFCB40B69"'
            $xml = $xml -replace '<PublisherDisplayName>AppPublisher</PublisherDisplayName>', '<PublisherDisplayName>Hamma</PublisherDisplayName>'
            [System.IO.File]::WriteAllText($manifest, $xml, [System.Text.Encoding]::UTF8)
            & $makeappx pack /d $dir /p $newMsix /o 2>&1
            Copy-Item $newMsix $msix -Force
            Remove-Item -Recurse -Force $dir, $newMsix -ErrorAction SilentlyContinue
            Write-Host "  Done"
          }

      - name: Sign MSIX (if certificate secrets configured)
        if: env.CERT_BASE64 != '' && env.CERT_PASSWORD != ''
        shell: pwsh
        continue-on-error: true
        run: |
          $signtool = Resolve-Path "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -First 1 -ExpandProperty Path
          if (-not $signtool) { Write-Host "signtool not found"; exit 0 }
          $pfxPath = "$env:RUNNER_TEMP\signing.pfx"
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CERT_BASE64))
          } catch {
            Write-Host "Failed to write PFX: $_"; exit 0
          }
          Get-ChildItem -Recurse -Filter "FluentFold*.msix" | ForEach-Object {
            & $signtool sign /fd SHA256 /a /f $pfxPath /p $env:CERT_PASSWORD $_.FullName
            if ($LASTEXITCODE -eq 0) { Write-Host "Signed: $($_.Name)" }
            else { Write-Host "Signing skipped for $($_.Name) (exit code $LASTEXITCODE)" }
          }

      - name: Flatten MSIX for upload
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "_output" | Out-Null
          Get-ChildItem -Recurse -Path "AppPackages" -Filter "FluentFold_*.msix" | Copy-Item -Destination "_output" -Force
          Get-ChildItem "_output"

      - name: Upload MSIX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}
          path: _output/*
          if-no-files-found: warn

  installer:
    strategy:
      matrix:
        platform: [x64]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }} -p:RuntimeIdentifier=win-${{ matrix.platform }}

      - name: Publish self-contained for ${{ matrix.platform }}
        run: |
          dotnet publish -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=win-${{ matrix.platform }} `
            -p:SelfContained=true `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:PublishSingleFile=false `
            -p:PublishReadyToRun=false `
            -p:PublishTrimmed=false `
            --no-restore

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Inno Setup*" -Filter "iscc.exe" -Recurse | Select-Object -First 1 -ExpandProperty FullName
          }
          $publishDir = "bin\Release\net10.0-windows10.0.26100.0\win-${{ matrix.platform }}\publish"
          Write-Host "Using: $iscc"
          Write-Host "PublishDir: $publishDir"
          & $iscc installer.iss /dPlatform=${{ matrix.platform }} /dPublishDir="$publishDir"
          Write-Host "=== Installer output ==="
          Get-ChildItem -Path "installer" -Filter "*-Setup.exe" | Select-Object FullName, Length

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}-Setup
          path: installer/FluentFold-${{ matrix.platform }}-Setup.exe
          if-no-files-found: error
