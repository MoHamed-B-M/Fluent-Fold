name: Build & Package

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  APP_NAME: 'FluentFold'

jobs:
  build:
    name: MSIX (${{ matrix.arch.name }})
    strategy:
      matrix:
        arch:
          - name: x64
            platform: x64
            rid: win-x64
          - name: x86
            platform: x86
            rid: win-x86
          - name: arm64
            platform: ARM64
            rid: win-arm64
      fail-fast: false
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FluentFold/FluentFold.csproj -r ${{ matrix.arch.rid }}

      - name: Build
        run: dotnet build FluentFold/FluentFold.csproj -c ${{ env.CONFIGURATION }} -r ${{ matrix.arch.rid }} --no-restore -p:Platform=${{ matrix.arch.platform }}

      - name: Create signing certificate
        id: cert
        run: |
          $cert = New-SelfSignedCertificate -Type Custom `
            -Subject "CN=FluentFold" `
            -KeyUsage DigitalSignature `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3") `
            -CertStoreLocation "Cert:\CurrentUser\My"
          $pwd = ConvertTo-SecureString -String "p@ssw0rd" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "signing.pfx" -Password $pwd
          Write-Host "Cert thumbprint: $($cert.Thumbprint)"
          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT

      - name: Locate build output
        id: paths
        run: |
          $exe = Get-ChildItem -Recurse "FluentFold\bin" -Filter "${{ env.APP_NAME }}.exe" |
            Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem FluentFold\bin -Recurse -Directory | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw "${{ env.APP_NAME }}.exe not found under FluentFold\bin"
          }
          $buildDir = $exe.Directory.FullName
          "build_dir=$buildDir" >> $env:GITHUB_OUTPUT
          Write-Host "Build dir: $buildDir"

      - name: Find Windows SDK tools
        id: sdk
        run: |
          $arch = "${{ matrix.arch.name }}"
          $kits = @(
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0",
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0",
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22000.0",
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.20348.0",
            "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0"
          )
          $found = $false
          foreach ($kit in $kits) {
            foreach ($sub in @($arch, "x64", "x86", "")) {
              $ma = if ($sub) { "$kit\$sub\makeappx.exe" } else { "$kit\makeappx.exe" }
              $st = if ($sub) { "$kit\$sub\signtool.exe" } else { "$kit\signtool.exe" }
              if ((Test-Path $ma) -and (Test-Path $st)) {
                "makeappx=$ma" >> $env:GITHUB_OUTPUT
                "signtool=$st" >> $env:GITHUB_OUTPUT
                Write-Host "makeappx: $ma"
                Write-Host "signtool: $st"
                $found = $true
                break
              }
            }
            if ($found) { break }
          }
          if (-not $found) { throw "Windows SDK tools not found" }

      - name: Create MSIX package
        run: |
          $buildDir = "${{ steps.paths.outputs.build_dir }}"
          $layout = "msix-layout"
          New-Item -ItemType Directory -Path "$layout\Assets" -Force

          Copy-Item "$buildDir\*" $layout -Recurse -Force -Exclude "*.xml","*.pdb"
          Write-Host "Copied $((Get-ChildItem $layout -File).Count) files to layout"

          $manifest = Get-Content "FluentFoldPackage\Package.appxmanifest" -Raw
          $manifest = $manifest -replace '\$targetnametoken\$', '${{ env.APP_NAME }}'
          $manifest = $manifest -replace '\$targetentrypoint\$', '${{ env.APP_NAME }}.App'
          Set-Content -Path "$layout\AppxManifest.xml" -Value $manifest

          Copy-Item "FluentFold\Assets\*" "$layout\Assets\" -Force

          $exeCount = (Get-ChildItem $layout -Filter "*.exe").Count
          Write-Host "EXEs in layout: $exeCount"
          if ($exeCount -eq 0) { throw "No .exe found in build output" }

          $msixFile = "${{ env.APP_NAME }}-${{ matrix.arch.name }}.msix"
          & "${{ steps.sdk.outputs.makeappx }}" pack /d $layout /p $msixFile /l
          if (-not (Test-Path $msixFile)) { throw "makeappx failed" }
          Write-Host "MSIX packed: $((Get-Item $msixFile).Length) bytes"

          $thumbprint = "${{ steps.cert.outputs.thumbprint }}"
          & "${{ steps.sdk.outputs.signtool }}" sign /fd SHA256 /debug /v `
            /s My /n "CN=FluentFold" `
            $msixFile 2>&1 | ForEach-Object { Write-Host "$_" }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "First signing attempt failed, trying PFX..."
            & "${{ steps.sdk.outputs.signtool }}" sign /fd SHA256 /debug /v `
              /f signing.pfx /p p@ssw0rd `
              $msixFile 2>&1 | ForEach-Object { Write-Host "$_" }
            if ($LASTEXITCODE -ne 0) { throw "signtool failed after retry" }
          }

          New-Item -ItemType Directory -Path publish -Force
          Move-Item $msixFile "publish\$msixFile" -Force
          $size = [math]::Round((Get-Item "publish\$msixFile").Length / 1MB, 2)
          Write-Host "MSIX created: publish\$msixFile ($size MB)"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.arch.name }}-msix
          path: publish\${{ env.APP_NAME }}-${{ matrix.arch.name }}.msix
          if-no-files-found: error