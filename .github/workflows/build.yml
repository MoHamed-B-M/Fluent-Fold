name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  APP_NAME: 'FluentFold'

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FluentFold/FluentFold.csproj

      - name: Build
        run: dotnet build FluentFold/FluentFold.csproj -c ${{ env.CONFIGURATION }} --no-restore

      - name: Locate and upload build artifacts
        run: |
          $paths = @(
            "FluentFold/bin/x64/Release/net8.0-windows10.0.19041.0",
            "FluentFold/bin/Release/net8.0-windows10.0.19041.0",
            "FluentFold/bin/x64/Release/net8.0-windows10.0.19041.0/win10-x64"
          )
          $found = $false
          foreach ($p in $paths) {
            if (Test-Path $p) {
              Write-Host "Found: $p"
              Get-ChildItem $p -Recurse -File | Select-Object -First 20 | ForEach-Object { Write-Host "  $($_.Name)" }
              $found = $true
            }
          }
          if (-not $found) {
            Get-ChildItem FluentFold/bin -Recurse -Directory | ForEach-Object { Write-Host "Dir: $($_.FullName)" }
          }

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-build
          path: FluentFold/bin/
          if-no-files-found: error