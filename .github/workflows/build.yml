name: Build MSIX Packages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        platform: [x64, x86, arm64]
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore -p:Platform=${{ matrix.platform }}

      - name: Build MSIX for ${{ matrix.platform }}
        run: |
          dotnet build -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifierOverride=win-${{ matrix.platform }} `
            -p:GenerateAppxPackageOnBuild=true `
            -p:AppxPackageSigningEnabled=false `
            -p:AppxPackage=true `
            --no-restore

      - name: Upload MSIX Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FluentFold-${{ matrix.platform }}
          path: |
            bin/${{ matrix.platform }}/Release/**/*.msix
            bin/${{ matrix.platform }}/Release/**/*.msixupload
            **/AppPackages/**/*.msix
            **/AppPackages/**/*.msixupload
          if-no-files-found: warn
