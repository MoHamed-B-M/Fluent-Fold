name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'
  APP_NAME: 'FluentFold'

jobs:
  build:
    name: Build and Package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore FluentFold/FluentFold.csproj

      - name: Publish portable app
        run: |
          dotnet publish FluentFold/FluentFold.csproj -c ${{ env.CONFIGURATION }} `
            -p:WindowsPackageType=None `
            -p:RuntimeIdentifierOverride=win10-x64 `
            --self-contained true `
            -o publish/${{ env.APP_NAME }}

      - name: Create portable ZIP
        run: |
          Compress-Archive -Path publish/${{ env.APP_NAME }}/* `
            -DestinationPath publish/${{ env.APP_NAME }}.zip `
            -CompressionLevel Optimal

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-x64-portable
          path: publish/${{ env.APP_NAME }}.zip

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-x64-build
          path: publish/${{ env.APP_NAME }}/
          if-no-files-found: warn