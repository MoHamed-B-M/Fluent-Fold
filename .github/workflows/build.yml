# =============================================================================
# Bulk File Organizer - Build & Release Workflow
# =============================================================================
# Builds the application into:
#   1. Portable .exe (single-folder) via PyInstaller
#   2. Windows Installer (.msi) via WiX Toolset (separate script)
#   3. Portable ZIP archive for manual distribution
#
# Triggers:
#   - Push to main/master         -> build + upload artifacts
#   - Pull requests               -> build + test only
#   - Semantic tags (v*)          -> build + publish GitHub Release
#   - Manual (workflow_dispatch)  -> build + upload artifacts
# =============================================================================

name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      create_release:
        description: Create a GitHub Release
        required: true
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.13'
  APP_NAME: 'FluentFold'
  PROJECT_DIR: 'bulk-file-organizer'

jobs:
  # ---------------------------------------------------------------------------
  # Windows Build  -  Portable .exe via PyInstaller
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Portable (.exe)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install git+https://github.com/zhiyiYo/PyQt-Fluent-Widgets.git
          pip install pyinstaller

      - name: Verify imports
        run: |
          python -c "from organizer import FileOrganizer; from gui import FileOrganizerGUI"

      - name: Build executable with PyInstaller
        run: pyinstaller FluentFold.spec

      - name: Verify executable
        run: |
          if (Test-Path "dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}.exe") {
            $f = Get-Item "dist/${{ env.APP_NAME }}/${{ env.APP_NAME }}.exe"
            Write-Host "OK - $($f.Name) ($([math]::Round($f.Length/1MB,2)) MB)"
          } else {
            throw "Executable not found"
          }

      - name: Create portable ZIP archive
        run: |
          Compress-Archive -Path "dist/${{ env.APP_NAME }}/*" `
            -DestinationPath "dist/${{ env.APP_NAME }}.zip" `
            -CompressionLevel Optimal
          $f = Get-Item "dist/${{ env.APP_NAME }}.zip"
          Write-Host "ZIP created: $($f.Name) ($([math]::Round($f.Length/1MB,2)) MB)"

      - name: Upload portable ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64-portable
          path: ${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}.zip
          if-no-files-found: error

      - name: Upload raw build folder
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64-build
          path: ${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # MSI Installer  -  Windows Installer via WiX Toolset
  # ---------------------------------------------------------------------------
  build-msi:
    name: Build Installer (.msi)
    needs: build-windows
    runs-on: windows-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64-build
          path: ${{ github.workspace }}/${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}/

      - name: Install WiX Toolset
        run: choco install wixtoolset --force -y --no-progress
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Collect version
        id: version
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          $tag = git describe --tags --always --abbrev=0 2>$null
          if ($tag -match '^v(.+)$') { $tag = $matches[1] }
          if ($tag -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') { $tag = "1.0.0" }
          "VERSION=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $tag"

      - name: Build MSI installer
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          $srcDir = (Get-Item "dist/${{ env.APP_NAME }}").FullName
          $version = "${{ steps.version.outputs.VERSION }}"
          & ".\build_msi.ps1" -SourceDir $srcDir -Version $version -OutputDir "dist"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64-installer
          path: ${{ github.workspace }}/${{ env.PROJECT_DIR }}/dist/${{ env.APP_NAME }}-*.msi
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Release  -  GitHub Release with all assets
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    needs: [build-windows, build-msi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find release-artifacts -type f \( -name "*.zip" -o -name "*.msi" \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -lh release-assets/

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
          if [ -n "$PREV" ]; then
            LOG=$(git log --oneline --pretty=format:"- %s (%h)" $PREV..HEAD)
          else
            LOG=$(git log --oneline --pretty=format:"- %s (%h)" -20 2>/dev/null || echo "- Initial release")
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Fluent Fold ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.NOTES }}
          draft: false
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: false

  # ---------------------------------------------------------------------------
  # Test  -  Quick sanity check on pull requests
  # ---------------------------------------------------------------------------
  test:
    name: Run Unit Tests
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install git+https://github.com/zhiyiYo/PyQt-Fluent-Widgets.git

      - name: Run organizer tests
        run: |
          python -u -c "
          import tempfile, os
          from pathlib import Path
          from organizer import FileOrganizer

          with tempfile.TemporaryDirectory() as tmpdir:
              (Path(tmpdir) / 'img1.jpg').write_text('img')
              (Path(tmpdir) / 'img2.png').write_text('img')
              (Path(tmpdir) / 'doc.pdf').write_text('doc')
              (Path(tmpdir) / 'vid.mp4').write_text('vid')

              org = FileOrganizer()

              s = org.get_folder_summary(tmpdir)
              total = s['total_files']
              assert total == 4, 'Expected 4, got ' + str(total)
              assert s['categories'].get('Images', 0) == 2
              print('  OK get_folder_summary')

              r = org.organize_by_type(tmpdir)
              assert r['total'] == 4
              assert (Path(tmpdir) / 'Images' / 'img1.jpg').exists()
              assert (Path(tmpdir) / 'Videos' / 'vid.mp4').exists()
              print('  OK organize_by_type')

              r2 = org.rename_files(str(Path(tmpdir) / 'Images'), 'photo', 1)
              assert r2['total'] == 2
              assert (Path(tmpdir) / 'Images' / 'photo_1.jpg').exists()
              print('  OK rename_files')

              r3 = org.undo_last_operation()
              assert r3['success'] == True
              assert (Path(tmpdir) / 'Images' / 'img1.jpg').exists()
              print('  OK undo rename')

              r4 = org.undo_last_operation()
              assert r4['success'] == True
              assert not (Path(tmpdir) / 'Images').exists()
              print('  OK undo organize')

              print()
              print('All tests passed!')
          "
